name: Build EXE

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Manuel çalıştırma

jobs:
  build:
    runs-on: windows-latest # Windows gerekli çünkü EXE oluşturuyoruz

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed KoboldAI.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: koboldai-client-exe
        path: dist/KoboldAI.exe
