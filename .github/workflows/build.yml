name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: List all files
      run: |
        ls -R

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "requirements.txt") { pip install -r requirements.txt }
        pip install pyinstaller

    - name: Build EXE (try different main files)
      run: |
        if (Test-Path "koboldai.py") {
          pyinstaller --onefile --windowed koboldai.py
        } elseif (Test-Path "KoboldAI.py") {
          pyinstaller --onefile --windowed KoboldAI.py
        } elseif (Test-Path "main.py") {
          pyinstaller --onefile --windowed main.py
        } else {
          echo "No main Python file found!"
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KoboldAI-EXE
        path: dist/*.exe
