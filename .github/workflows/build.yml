name: Build EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: List all files (debug)
      run: |
        ls -R

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if (Test-Path "requirements.txt") { pip install -r requirements.txt }
        pip install pyinstaller

    - name: Find main file and build EXE
      run: |
        $file = Get-ChildItem -Recurse -Include aiserver.py,koboldai.py,main.py | Select-Object -First 1

        if ($file) {
          echo "Found main file: $($file.FullName)"
          pyinstaller --onedir --windowed $file.FullName
        } else {
          echo "No main Python file found!"
          exit 1
        }

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: KoboldAI-EXE
        path: dist/
